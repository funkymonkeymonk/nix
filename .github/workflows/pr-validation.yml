---
name: PR Validation
# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Quick Validation & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Install devenv.sh
        run: nix profile add --accept-flake-config nixpkgs#devenv
      - name: Run lint checks
        run: devenv tasks run check:lint
  test-darwin:
    name: Darwin Configuration Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Install devenv.sh
        run: nix profile add --accept-flake-config nixpkgs#devenv
      - name: Run Darwin build (dry-run)
        run: |
          echo "Building Darwin configurations"
          echo "=================================="
          for config in wweaver MegamanX; do
            echo "Building $config configuration..."
            if nix build .#darwinConfigurations.$config.system --dry-run --quiet 2>&1; then
              echo "$config build plan validated"
            else
              echo "$config build plan failed"
              exit 1
            fi
          done
          echo "All Darwin builds completed"
  test-linux:
    name: Linux Configuration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Install devenv.sh
        run: nix profile add --accept-flake-config nixpkgs#devenv
      - name: Run Linux build (dry-run)
        run: devenv tasks run build:nixos
