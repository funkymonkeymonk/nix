---
name: PR Validation
# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quick validation runs first - blocks builds if it fails
  lint:
    name: Quick Validation & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Install devenv.sh
        run: nix profile add --accept-flake-config nixpkgs#devenv
      - name: Run lint checks
        run: devenv tasks run check:lint

  # Check if Nix files changed (skip builds if only docs changed)
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      nix-files: ${{ steps.filter.outputs.nix-files }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for Nix file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nix-files:
              - '**/*.nix'
              - 'flake.lock'
            workflows:
              - '.github/workflows/**'

  # Discover what configurations exist and check if they need rebuilds
  discover-targets:
    name: Discover Build Targets
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: >
      ${{
        needs.changes.outputs.nix-files == 'true' ||
        needs.changes.outputs.workflows == 'true'
      }}
    outputs:
      darwin-configs: ${{ steps.discover.outputs.darwin-configs }}
      nixos-configs: ${{ steps.discover.outputs.nixos-configs }}
      darwin-count: ${{ steps.discover.outputs.darwin-count }}
      nixos-count: ${{ steps.discover.outputs.nixos-count }}
      darwin-changed: ${{ steps.check-changes.outputs.darwin-changed }}
      nixos-changed: ${{ steps.check-changes.outputs.nixos-changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true

      # Restore cached derivation hashes
      - name: Restore derivation cache
        uses: actions/cache@v4
        id: drv-cache
        with:
          path: .drv-cache
          key: drv-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            drv-${{ github.ref }}-
            drv-main-

      - name: Discover configurations
        id: discover
        run: |
          echo "Discovering flake configurations..."
          mkdir -p .drv-cache

          # Get Darwin configurations
          DARWIN_CONFIGS=$(nix eval .#darwinConfigurations \
            --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          DARWIN_COUNT=$(echo $DARWIN_CONFIGS | jq 'length')
          echo "darwin-configs=$DARWIN_CONFIGS" >> $GITHUB_OUTPUT
          echo "darwin-count=$DARWIN_COUNT" >> $GITHUB_OUTPUT
          echo "Darwin configurations ($DARWIN_COUNT): $DARWIN_CONFIGS"

          # Get NixOS configurations
          NIXOS_CONFIGS=$(nix eval .#nixosConfigurations \
            --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          NIXOS_COUNT=$(echo $NIXOS_CONFIGS | jq 'length')
          echo "nixos-configs=$NIXOS_CONFIGS" >> $GITHUB_OUTPUT
          echo "nixos-count=$NIXOS_COUNT" >> $GITHUB_OUTPUT
          echo "NixOS configurations ($NIXOS_COUNT): $NIXOS_CONFIGS"

      - name: Check which configs changed
        id: check-changes
        run: |
          echo "Checking which configurations need rebuilds..."

          # Function to compute derivation hash for a config
          compute_drv_hash() {
            local config=$1
            local type=$2
            local drv_path

            if [ "$type" = "darwin" ]; then
              drv_path=$(nix-instantiate \
                .#darwinConfigurations.${config}.system 2>/dev/null || echo "")
            else
              drv_path=$(nix-instantiate \
                .#nixosConfigurations.${config}.config.system.build.toplevel \
                2>/dev/null || echo "")
            fi

            if [ -n "$drv_path" ]; then
              # Get the hash of the derivation
              nix-store -q --hash "$drv_path" 2>/dev/null || echo ""
            else
              echo ""
            fi
          }

          # Check Darwin configs
          DARWIN_CHANGED="[]"
          if [ -f .drv-cache/darwin-configs ]; then
            DARWIN_CHANGED_CONFIGS=()
            for config in $(cat .drv-cache/darwin-configs | jq -r '.[]'); do
              OLD_HASH=$(cat .drv-cache/darwin-${config}.hash 2>/dev/null || echo "")
              NEW_HASH=$(compute_drv_hash "$config" "darwin")

              if [ "$OLD_HASH" != "$NEW_HASH" ]; then
                echo "Darwin config '$config' changed ($OLD_HASH -> $NEW_HASH)"
                DARWIN_CHANGED_CONFIGS+=("$config")
              else
                echo "Darwin config '$config' unchanged"
              fi

              # Save new hash for next run
              echo "$NEW_HASH" > .drv-cache/darwin-${config}.hash
            done

            if [ ${#DARWIN_CHANGED_CONFIGS[@]} -gt 0 ]; then
              DARWIN_CHANGED=$(printf '%s\n' "${DARWIN_CHANGED_CONFIGS[@]}" | jq -R . | jq -s .)
            fi
          else
            # No cache exists, build all configs
            echo "No cache found, will build all Darwin configs"
            DARWIN_CHANGED='["core","MegamanX","wweaver"]'
          fi

          echo "darwin-changed=$DARWIN_CHANGED" >> $GITHUB_OUTPUT
          echo "Darwin configs needing rebuild: $DARWIN_CHANGED"

          # Check NixOS configs
          NIXOS_CHANGED="[]"
          if [ -f .drv-cache/nixos-configs ]; then
            NIXOS_CHANGED_CONFIGS=()
            for config in $(cat .drv-cache/nixos-configs | jq -r '.[]'); do
              OLD_HASH=$(cat .drv-cache/nixos-${config}.hash 2>/dev/null || echo "")
              NEW_HASH=$(compute_drv_hash "$config" "nixos")

              if [ "$OLD_HASH" != "$NEW_HASH" ]; then
                echo "NixOS config '$config' changed ($OLD_HASH -> $NEW_HASH)"
                NIXOS_CHANGED_CONFIGS+=("$config")
              else
                echo "NixOS config '$config' unchanged"
              fi

              # Save new hash for next run
              echo "$NEW_HASH" > .drv-cache/nixos-${config}.hash
            done

            if [ ${#NIXOS_CHANGED_CONFIGS[@]} -gt 0 ]; then
              NIXOS_CHANGED=$(printf '%s\n' "${NIXOS_CHANGED_CONFIGS[@]}" | jq -R . | jq -s .)
            fi
          else
            # No cache exists, build all configs
            echo "No cache found, will build all NixOS configs"
            NIXOS_CHANGED='["bootstrap","installer-iso","type-desktop","type-server","zero"]'
          fi

          echo "nixos-changed=$NIXOS_CHANGED" >> $GITHUB_OUTPUT
          echo "NixOS configs needing rebuild: $NIXOS_CHANGED"

          # Save current config lists
          echo '${{ steps.discover.outputs.darwin-configs }}' > .drv-cache/darwin-configs
          echo '${{ steps.discover.outputs.nixos-configs }}' > .drv-cache/nixos-configs

      # Save derivation cache for future runs
      - name: Save derivation cache
        uses: actions/cache@v4
        with:
          path: .drv-cache
          key: drv-${{ github.ref }}-${{ github.sha }}

  # Build all Darwin configurations that changed
  build-darwin:
    name: Build Darwin - ${{ matrix.config }}
    needs: discover-targets
    runs-on: macos-latest
    if: ${{ needs.discover-targets.outputs.darwin-changed != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-targets.outputs.darwin-changed) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Build ${{ matrix.config }}
        id: build
        run: |
          echo "Building Darwin configuration: ${{ matrix.config }}"
          if nix build .#darwinConfigurations.${{ matrix.config }}.system \
              --dry-run --quiet 2>&1; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✓ Build plan validated"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "✗ Build failed"
            exit 1
          fi

  # Build all NixOS configurations that changed
  build-nixos:
    name: Build NixOS - ${{ matrix.config }}
    needs: discover-targets
    runs-on: ubuntu-latest
    if: ${{ needs.discover-targets.outputs.nixos-changed != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-targets.outputs.nixos-changed) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Create stub facter.json
        run: |
          # Create stub facter.json for CI builds
          sudo mkdir -p /etc/nixos
          sudo tee /etc/nixos/facter.json > /dev/null << 'FACTER_EOF'
          {
            "version": 1,
            "hardware": {
              "system": { "uuid": "00000000-0000-0000-0000-000000000000" },
              "cpu": { "architecture": "x86_64", "vendor": "GenuineIntel", "cores": 4 },
              "memory": { "total_bytes": 8589934592 },
              "disks": [{ "path": "/dev/sda", "size_bytes": 53687091200 }],
              "network_interfaces": [{ "name": "eth0", "mac": "00:00:00:00:00:00" }]
            },
            "boot": { "efi_available": true },
            "filesystems": [{ "mountpoint": "/", "device": "/dev/sda1", "fs_type": "ext4" }]
          }
          FACTER_EOF
      - name: Build ${{ matrix.config }}
        id: build
        run: |
          echo "Building NixOS configuration: ${{ matrix.config }}"
          # Use --impure to allow reading /etc/nixos/facter.json
          if nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
              --dry-run --quiet --impure 2>&1; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✓ Build plan validated"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "✗ Build failed"
            exit 1
          fi

  # Collect all build results and report
  build-report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: [build-darwin, build-nixos, discover-targets]
    if: always()
    steps:
      - name: Report build results
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          DARWIN_RESULT="${{ needs.build-darwin.result }}"
          NIXOS_RESULT="${{ needs.build-nixos.result }}"
          DARWIN_CHANGED='${{ needs.discover-targets.outputs.darwin-changed }}'
          NIXOS_CHANGED='${{ needs.discover-targets.outputs.nixos-changed }}'

          # Count configs
          DARWIN_TOTAL=$(echo '${{ needs.discover-targets.outputs.darwin-configs }}' \
            | jq 'length')
          NIXOS_TOTAL=$(echo '${{ needs.discover-targets.outputs.nixos-configs }}' \
            | jq 'length')
          DARWIN_CHANGED_COUNT=$(echo "$DARWIN_CHANGED" | jq 'length')
          NIXOS_CHANGED_COUNT=$(echo "$NIXOS_CHANGED" | jq 'length')

          echo "**Darwin:** $DARWIN_CHANGED_COUNT of $DARWIN_TOTAL configs changed" >> $GITHUB_STEP_SUMMARY
          echo "**NixOS:** $NIXOS_CHANGED_COUNT of $NIXOS_TOTAL configs changed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$DARWIN_CHANGED" = "[]" ] && [ "$NIXOS_CHANGED" = "[]" ]; then
            echo "✅ No configuration changes detected - all builds skipped" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ "$DARWIN_RESULT" = "success" ] || [ "$DARWIN_RESULT" = "skipped" ]; then
            if [ "$NIXOS_RESULT" = "success" ] || [ "$NIXOS_RESULT" = "skipped" ]; then
              echo "✅ All builds passed!" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Some NixOS builds failed" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "❌ Some Darwin builds failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # Validate auxiliary components (always run)
  validate-auxiliary:
    name: Validate Shared Components
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
        continue-on-error: true
      - name: Install devenv.sh
        run: nix profile add --accept-flake-config nixpkgs#devenv
      - name: Validate Disko configurations
        run: devenv tasks run validate:disko
      - name: Validate installation script
        run: devenv tasks run validate:install-script
