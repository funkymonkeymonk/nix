---
name: PR Validation
# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: true
        env:
          FLAKEHUB_TOKEN: ${{ secrets.FLAKEHUB_TOKEN }}
        continue-on-error: true
      - name: Install devenv.sh
        shell: bash
        run: nix profile install --accept-flake-config nixpkgs#devenv
      - name: Run lint checks
        run: devenv tasks run check:lint
  test-darwin:
    if: false
    name: Darwin Configuration Tests
    runs-on: macos-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: true
        env:
          FLAKEHUB_TOKEN: ${{ secrets.FLAKEHUB_TOKEN }}
        continue-on-error: true
      - name: Install devenv.sh
        shell: bash
        run: nix profile install --accept-flake-config nixpkgs#devenv
      - name: Run Darwin build (dry-run)
        run: devenv tasks run build:darwin
  test-linux:
    if: false
    name: Linux Configuration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: devenv shell bash -- -e {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: true
        env:
          FLAKEHUB_TOKEN: ${{ secrets.FLAKEHUB_TOKEN }}
        continue-on-error: true
      - name: Install devenv.sh
        shell: bash
        run: nix profile install --accept-flake-config nixpkgs#devenv
      - name: Run Linux build (dry-run)
        run: devenv tasks run build:nixos
