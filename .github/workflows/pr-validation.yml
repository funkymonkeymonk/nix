---
name: PR Validation
# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Quick validation runs first - blocks builds if it fails
  lint:
    name: Quick Validation & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Install devenv.sh (pinned to flake.lock nixpkgs)
        run: |
          NIXPKGS_OWNER=$(jq -r '.nodes.nixpkgs.locked.owner' flake.lock)
          NIXPKGS_REPO=$(jq -r '.nodes.nixpkgs.locked.repo' flake.lock)
          NIXPKGS_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          nix profile add --accept-flake-config \
            "github:${NIXPKGS_OWNER}/${NIXPKGS_REPO}/${NIXPKGS_REV}#devenv"
      - name: Run lint checks
        run: devenv tasks run check:lint
  # Check if Nix files changed (skip builds/tests if only docs changed)
  # Runs in parallel with lint since it only checks file paths
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      nix-files: ${{ steps.filter.outputs.nix-files }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check for Nix file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nix-files:
              - '**/*.nix'
              - 'flake.lock'
            workflows:
              - '.github/workflows/**'
  # Discover what configurations exist and check if they need rebuilds
  discover-targets:
    name: Discover Build Targets
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: >
      ${{
        needs.changes.outputs.nix-files == 'true' ||
        needs.changes.outputs.workflows == 'true'
      }}
    outputs:
      darwin-configs: ${{ steps.discover.outputs.darwin-configs }}
      nixos-configs: ${{ steps.discover.outputs.nixos-configs }}
      darwin-count: ${{ steps.discover.outputs.darwin-count }}
      nixos-count: ${{ steps.discover.outputs.nixos-count }}
      darwin-changed: ${{ steps.check-changes.outputs.darwin-changed }}
      nixos-changed: ${{ steps.check-changes.outputs.nixos-changed }}
      nixos-arm-changed: ${{ steps.check-changes.outputs.nixos-arm-changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      # Restore cached derivation hashes
      - name: Restore derivation cache
        uses: actions/cache@v4
        id: drv-cache
        with:
          path: .drv-cache
          key: drv-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            drv-${{ github.ref }}-
            drv-main-
      - name: Create stub facter.json
        run: bash .github/scripts/create-facter-stub.sh
      - name: Discover configurations
        id: discover
        run: |
          echo "Discovering flake configurations..."
          mkdir -p .drv-cache
          # Get Darwin configurations
          DARWIN_CONFIGS=$(nix eval .#darwinConfigurations \
            --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          DARWIN_COUNT=$(echo $DARWIN_CONFIGS | jq 'length')
          # Use multi-line syntax for JSON output
          echo "darwin-configs<<EOF" >> $GITHUB_OUTPUT
          echo "$DARWIN_CONFIGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "darwin-count=$DARWIN_COUNT" >> $GITHUB_OUTPUT
          echo "Darwin configurations ($DARWIN_COUNT): $DARWIN_CONFIGS"
          # Get NixOS configurations
          NIXOS_CONFIGS=$(nix eval .#nixosConfigurations \
            --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          NIXOS_COUNT=$(echo $NIXOS_CONFIGS | jq 'length')
          # Use multi-line syntax for JSON output
          echo "nixos-configs<<EOF" >> $GITHUB_OUTPUT
          echo "$NIXOS_CONFIGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "nixos-count=$NIXOS_COUNT" >> $GITHUB_OUTPUT
          echo "NixOS configurations ($NIXOS_COUNT): $NIXOS_CONFIGS"
      - name: Check which configs changed
        id: check-changes
        run: |
          echo "Checking which configurations need rebuilds..."
          # Create staging directory at the start
          mkdir -p .drv-cache-staging
          # Function to compute derivation hash for a config
          compute_drv_hash() {
            local config=$1
            local type=$2
            local drv_path
            if [ "$type" = "darwin" ]; then
              drv_path=$(nix-instantiate \
                .#darwinConfigurations.${config}.system 2>/dev/null || echo "")
            else
              drv_path=$(nix-instantiate --impure \
                .#nixosConfigurations.${config}.config.system.build.toplevel \
                2>/dev/null || echo "")
            fi
            if [ -n "$drv_path" ]; then
              # Get the hash of the derivation
              nix-store -q --hash "$drv_path" 2>/dev/null || echo ""
            else
              echo ""
            fi
          }
          # Check Darwin configs
          DARWIN_CHANGED="[]"
          if [ -f .drv-cache/darwin-configs ]; then
            DARWIN_CHANGED_CONFIGS=()
            for config in $(cat .drv-cache/darwin-configs | jq -r '.[]'); do
              OLD_HASH=$(cat .drv-cache/darwin-${config}.hash 2>/dev/null || echo "")
              NEW_HASH=$(compute_drv_hash "$config" "darwin")
              if [ "$OLD_HASH" != "$NEW_HASH" ]; then
                echo "Darwin config '$config' changed ($OLD_HASH -> $NEW_HASH)"
                DARWIN_CHANGED_CONFIGS+=("$config")
              else
                echo "Darwin config '$config' unchanged"
              fi
              # Write new hash to a staging directory (not the cache yet)
              echo "$NEW_HASH" > .drv-cache-staging/darwin-${config}.hash
            done
            if [ ${#DARWIN_CHANGED_CONFIGS[@]} -gt 0 ]; then
              DARWIN_CHANGED=$(printf '%s\n' "${DARWIN_CHANGED_CONFIGS[@]}" | jq -R . | jq -s .)
            fi
          else
            # No cache exists, discover configs dynamically
            echo "No cache found, discovering Darwin configs dynamically..."
            DARWIN_CHANGED=$(nix eval .#darwinConfigurations \
              --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          fi
          echo "darwin-changed<<EOF" >> $GITHUB_OUTPUT
          echo "$DARWIN_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Darwin configs needing rebuild: $DARWIN_CHANGED"
          # Check NixOS configs
          NIXOS_CHANGED="[]"
          NIXOS_ARM_CHANGED="[]"
          if [ -f .drv-cache/nixos-configs ]; then
            NIXOS_CHANGED_CONFIGS=()
            NIXOS_ARM_CHANGED_CONFIGS=()
            for config in $(cat .drv-cache/nixos-configs | jq -r '.[]'); do
              OLD_HASH=$(cat .drv-cache/nixos-${config}.hash 2>/dev/null || echo "")
              NEW_HASH=$(compute_drv_hash "$config" "nixos")
              if [ "$OLD_HASH" != "$NEW_HASH" ]; then
                echo "NixOS config '$config' changed ($OLD_HASH -> $NEW_HASH)"
                if echo "$config" | grep -qE -- '-arm(-|$)'; then
                  NIXOS_ARM_CHANGED_CONFIGS+=("$config")
                else
                  NIXOS_CHANGED_CONFIGS+=("$config")
                fi
              else
                echo "NixOS config '$config' unchanged"
              fi
              # Write new hash to a staging directory (not the cache yet)
              echo "$NEW_HASH" > .drv-cache-staging/nixos-${config}.hash
            done
            if [ ${#NIXOS_CHANGED_CONFIGS[@]} -gt 0 ]; then
              NIXOS_CHANGED=$(printf '%s\n' "${NIXOS_CHANGED_CONFIGS[@]}" | jq -R . | jq -s .)
            fi
            if [ ${#NIXOS_ARM_CHANGED_CONFIGS[@]} -gt 0 ]; then
              NIXOS_ARM_CHANGED=$(printf '%s\n' "${NIXOS_ARM_CHANGED_CONFIGS[@]}" | jq -R . | jq -s .)
            fi
          else
             # No cache exists, discover configs dynamically
            echo "No cache found, discovering NixOS configs dynamically..."
            ALL_NIXOS=$(nix eval --impure .#nixosConfigurations \
              --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
            # ARM configs build on ubuntu-24.04-arm, x86_64 configs on ubuntu-latest
            NIXOS_ARM_CHANGED=$(echo "$ALL_NIXOS" | jq '[.[] | select(test("-arm(-|$)"))]')
            NIXOS_CHANGED=$(echo "$ALL_NIXOS" | jq '[.[] | select(test("-arm(-|$)") | not)]')
          fi
          echo "nixos-changed<<EOF" >> $GITHUB_OUTPUT
          echo "$NIXOS_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "nixos-arm-changed<<EOF" >> $GITHUB_OUTPUT
          echo "$NIXOS_ARM_CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "NixOS configs needing rebuild (x86_64): $NIXOS_CHANGED"
          echo "NixOS configs needing rebuild (ARM): $NIXOS_ARM_CHANGED"
          # Save current config lists to staging
          echo '${{ steps.discover.outputs.darwin-configs }}' > .drv-cache-staging/darwin-configs
          echo '${{ steps.discover.outputs.nixos-configs }}' > .drv-cache-staging/nixos-configs
      # Upload staging cache as artifact (will be committed to cache after successful builds)
      - name: Upload staging cache
        uses: actions/upload-artifact@v4
        with:
          name: drv-cache-staging
          path: .drv-cache-staging/
          retention-days: 1
  # Build all Darwin configurations that changed
  build-darwin:
    name: Build Darwin - ${{ matrix.config }}
    needs: discover-targets
    runs-on: macos-latest
    if: ${{ needs.discover-targets.outputs.darwin-changed != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-targets.outputs.darwin-changed) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Build ${{ matrix.config }}
        id: build
        run: |
          echo "Building Darwin configuration: ${{ matrix.config }}"
          if nix build .#darwinConfigurations.${{ matrix.config }}.system \
              --dry-run --quiet 2>&1; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✓ Build plan validated"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "✗ Build failed"
            exit 1
          fi
  # Build all NixOS configurations that changed (x86_64)
  build-nixos:
    name: Build NixOS - ${{ matrix.config }}
    needs: discover-targets
    runs-on: ubuntu-latest
    if: ${{ needs.discover-targets.outputs.nixos-changed != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-targets.outputs.nixos-changed) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Create stub facter.json
        run: bash .github/scripts/create-facter-stub.sh
      - name: Build ${{ matrix.config }}
        id: build
        run: |
          echo "Building NixOS configuration: ${{ matrix.config }}"
          # Use --impure to allow reading /etc/nixos/facter.json
          if nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
              --dry-run --quiet --impure 2>&1; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✓ Build plan validated"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "✗ Build failed"
            exit 1
          fi
  # Build all ARM NixOS configurations on native ARM runners
  build-nixos-arm:
    name: Build NixOS (ARM) - ${{ matrix.config }}
    needs: discover-targets
    runs-on: ubuntu-24.04-arm
    if: ${{ needs.discover-targets.outputs.nixos-arm-changed != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.discover-targets.outputs.nixos-arm-changed) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Create stub facter.json
        run: bash .github/scripts/create-facter-stub.sh
      - name: Build ${{ matrix.config }}
        id: build
        run: |
          echo "Building NixOS ARM configuration: ${{ matrix.config }}"
          if nix build .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel \
              --dry-run --quiet --impure 2>&1; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "✓ Build plan validated"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "✗ Build failed"
            exit 1
          fi
  # Collect all build results and report
  build-report:
    name: Build Report
    runs-on: ubuntu-latest
    needs:
      - build-darwin
      - build-nixos
      - build-nixos-arm
      - discover-targets
      - test-foundation
      - validate-auxiliary
    if: always()
    steps:
      - name: Download staging cache
        uses: actions/download-artifact@v4
        with:
          name: drv-cache-staging
          path: .drv-cache-new
        continue-on-error: true
      - name: Commit cache on success
        if: >
          ${{
            (needs.build-darwin.result == 'success' ||
             needs.build-darwin.result == 'skipped') &&
            (needs.build-nixos.result == 'success' ||
             needs.build-nixos.result == 'skipped') &&
            (needs.build-nixos-arm.result == 'success' ||
             needs.build-nixos-arm.result == 'skipped') &&
            (needs.test-foundation.result == 'success' ||
             needs.test-foundation.result == 'skipped') &&
            (needs.validate-auxiliary.result == 'success' ||
             needs.validate-auxiliary.result == 'skipped')
          }}
        run: |
          echo "Builds succeeded - committing new derivation hashes to cache"
          mkdir -p .drv-cache
          if [ -d .drv-cache-new ]; then
            cp -r .drv-cache-new/* .drv-cache/
            echo "Cache updated with new derivation hashes"
          fi
      - name: Save derivation cache
        if: >
          ${{
            (needs.build-darwin.result == 'success' ||
             needs.build-darwin.result == 'skipped') &&
            (needs.build-nixos.result == 'success' ||
             needs.build-nixos.result == 'skipped') &&
            (needs.build-nixos-arm.result == 'success' ||
             needs.build-nixos-arm.result == 'skipped') &&
            (needs.test-foundation.result == 'success' ||
             needs.test-foundation.result == 'skipped') &&
            (needs.validate-auxiliary.result == 'success' ||
             needs.validate-auxiliary.result == 'skipped')
          }}
        uses: actions/cache@v4
        with:
          path: .drv-cache
          key: drv-${{ github.ref }}-${{ github.sha }}
      - name: Save derivation cache
        if: >
          ${{
            (needs.build-darwin.result == 'success' ||
             needs.build-darwin.result == 'skipped') &&
            (needs.build-nixos.result == 'success' ||
             needs.build-nixos.result == 'skipped') &&
            (needs.test-foundation.result == 'success' ||
             needs.test-foundation.result == 'skipped') &&
            (needs.validate-auxiliary.result == 'success' ||
             needs.validate-auxiliary.result == 'skipped')
          }}
        uses: actions/cache@v4
        with:
          path: .drv-cache
          key: drv-${{ github.ref }}-${{ github.sha }}
      - name: Report build results
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          DARWIN_RESULT="${{ needs.build-darwin.result }}"
          NIXOS_RESULT="${{ needs.build-nixos.result }}"
          NIXOS_ARM_RESULT="${{ needs.build-nixos-arm.result }}"
          TEST_FOUNDATION_RESULT="${{ needs.test-foundation.result }}"
          VALIDATE_AUX_RESULT="${{ needs.validate-auxiliary.result }}"
          DARWIN_CHANGED='${{ needs.discover-targets.outputs.darwin-changed }}'
          NIXOS_CHANGED='${{ needs.discover-targets.outputs.nixos-changed }}'
          NIXOS_ARM_CHANGED='${{ needs.discover-targets.outputs.nixos-arm-changed }}'
          # Count configs
          DARWIN_TOTAL=$(echo '${{ needs.discover-targets.outputs.darwin-configs }}' \
            | jq 'length')
          NIXOS_TOTAL=$(echo '${{ needs.discover-targets.outputs.nixos-configs }}' \
            | jq 'length')
          DARWIN_CHANGED_COUNT=$(echo "$DARWIN_CHANGED" | jq 'length')
          NIXOS_CHANGED_COUNT=$(echo "$NIXOS_CHANGED" | jq 'length')
          NIXOS_ARM_CHANGED_COUNT=$(echo "$NIXOS_ARM_CHANGED" | jq 'length')
          SUMMARY="**Darwin:** $DARWIN_CHANGED_COUNT of $DARWIN_TOTAL"
          echo "$SUMMARY configs changed" >> $GITHUB_STEP_SUMMARY
          SUMMARY="**NixOS (x86_64):** $NIXOS_CHANGED_COUNT of $NIXOS_TOTAL"
          echo "$SUMMARY configs changed" >> $GITHUB_STEP_SUMMARY
          SUMMARY="**NixOS (ARM):** $NIXOS_ARM_CHANGED_COUNT of $NIXOS_TOTAL"
          echo "$SUMMARY configs changed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Report validation results
          echo "### Validation" >> $GITHUB_STEP_SUMMARY
          if [ "$VALIDATE_AUX_RESULT" = "success" ]; then
            echo "✅ Auxiliary validation passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$VALIDATE_AUX_RESULT" = "skipped" ]; then
            echo "⏭️ Auxiliary validation skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Auxiliary validation failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Report test results
          echo "### Tests" >> $GITHUB_STEP_SUMMARY
          if [ "$TEST_FOUNDATION_RESULT" = "success" ]; then
            echo "✅ Foundation tests passed" >> $GITHUB_STEP_SUMMARY
          elif [ "$TEST_FOUNDATION_RESULT" = "skipped" ]; then
            echo "⏭️ Foundation tests skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Foundation tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$DARWIN_CHANGED" = "[]" ] && [ "$NIXOS_CHANGED" = "[]" ]; then
            echo "✅ No configuration changes detected - all builds skipped" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          # Check all results
          ALL_SUCCESS=true
          if [ "$DARWIN_RESULT" != "success" ] && [ "$DARWIN_RESULT" != "skipped" ]; then
            echo "❌ Darwin builds failed" >> $GITHUB_STEP_SUMMARY
            ALL_SUCCESS=false
          fi
          if [ "$NIXOS_RESULT" != "success" ] && [ "$NIXOS_RESULT" != "skipped" ]; then
            echo "❌ NixOS (x86_64) builds failed" >> $GITHUB_STEP_SUMMARY
            ALL_SUCCESS=false
          fi
          if [ "$NIXOS_ARM_RESULT" != "success" ] && [ "$NIXOS_ARM_RESULT" != "skipped" ]; then
            echo "❌ NixOS (ARM) builds failed" >> $GITHUB_STEP_SUMMARY
            ALL_SUCCESS=false
          fi
          if [ "$TEST_FOUNDATION_RESULT" != "success" ] \
            && [ "$TEST_FOUNDATION_RESULT" != "skipped" ]; then
            echo "❌ Foundation tests failed" >> $GITHUB_STEP_SUMMARY
            ALL_SUCCESS=false
          fi
          if [ "$VALIDATE_AUX_RESULT" != "success" ] \
            && [ "$VALIDATE_AUX_RESULT" != "skipped" ]; then
            echo "❌ Auxiliary validation failed" >> $GITHUB_STEP_SUMMARY
            ALL_SUCCESS=false
          fi
          if [ "$ALL_SUCCESS" = "true" ]; then
            echo "✅ All builds and tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            exit 1
          fi
  # Validate auxiliary components (only when nix files changed)
  validate-auxiliary:
    name: Validate Shared Components
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: >
      ${{
        needs.changes.outputs.nix-files == 'true' ||
        needs.changes.outputs.workflows == 'true'
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Install devenv.sh (pinned to flake.lock nixpkgs)
        run: |
          NIXPKGS_OWNER=$(jq -r '.nodes.nixpkgs.locked.owner' flake.lock)
          NIXPKGS_REPO=$(jq -r '.nodes.nixpkgs.locked.repo' flake.lock)
          NIXPKGS_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          nix profile add --accept-flake-config \
            "github:${NIXPKGS_OWNER}/${NIXPKGS_REPO}/${NIXPKGS_REV}#devenv"
      - name: Validate Disko configurations
        run: devenv tasks run validate:disko
      - name: Validate installation script
        run: devenv tasks run validate:install-script
  # Run foundation tests (only when nix files changed)
  test-foundation:
    name: Foundation Tests
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: >
      ${{
        needs.changes.outputs.nix-files == 'true' ||
        needs.changes.outputs.workflows == 'true'
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            access-tokens = github.com=${{ github.token }} api.github.com=${{ github.token }}
      - name: Cachix (read-only)
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          skipPush: true
      - name: Install devenv.sh (pinned to flake.lock nixpkgs)
        run: |
          NIXPKGS_OWNER=$(jq -r '.nodes.nixpkgs.locked.owner' flake.lock)
          NIXPKGS_REPO=$(jq -r '.nodes.nixpkgs.locked.repo' flake.lock)
          NIXPKGS_REV=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          nix profile add --accept-flake-config \
            "github:${NIXPKGS_OWNER}/${NIXPKGS_REPO}/${NIXPKGS_REV}#devenv"
      - name: Run foundation tests
        run: |
          echo "Running foundation test suite..."
          devenv tasks run test:all
