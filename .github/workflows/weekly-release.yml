---
name: Weekly Flake Update
on:
  schedule:
    # Every Friday at 4:00 AM UTC — kicks off the weekly release cycle
    - cron: "0 4 * * 5"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: weekly-release
  cancel-in-progress: false
jobs:
  flake-update:
    name: Update Flake Inputs
    runs-on: ubuntu-latest
    outputs:
      changes-detected: ${{ steps.check-updates.outputs.changes_detected }}
      pr-number: ${{ steps.create-pr.outputs.pr_number }}
      pr-url: ${{ steps.create-pr.outputs.pr_url }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          upstream-cache: false
      - name: Close existing flake update PRs
        id: close-existing
        run: |
          existing_prs=$(gh pr list \
            --repo ${{ github.repository }} \
            --label "flake-update" \
            --state open \
            --json number,title \
            --jq '.[].number')
          for pr_number in $existing_prs; do
            echo "Closing superseded PR #$pr_number"
            gh pr close "$pr_number" \
              --comment "Superseded by new weekly release run" \
              --repo ${{ github.repository }}
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update flake.lock
        id: check-updates
        run: |
          cp flake.lock flake.lock.before
          if nix flake update; then
            if ! diff -q flake.lock.before flake.lock > /dev/null 2>&1; then
              echo "changes_detected=true" >> "$GITHUB_OUTPUT"
              changed_inputs=$(diff -u flake.lock.before flake.lock \
                | grep -c "^-[[:space:]]*\"rev\"" 2>/dev/null || echo "0")
              changed_inputs="${changed_inputs//[^0-9]/}"
              [ -z "$changed_inputs" ] && changed_inputs="0"
              echo "changed_inputs=$changed_inputs" >> "$GITHUB_OUTPUT"
              git config user.name "github-actions[bot]"
              git config user.email \
                "github-actions[bot]@users.noreply.github.com"
              git add flake.lock
              git commit -m \
                "chore: update flake.lock ($changed_inputs inputs updated)"
            else
              echo "changes_detected=false" >> "$GITHUB_OUTPUT"
              git checkout -- flake.lock
            fi
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            git checkout -- flake.lock
          fi
          rm -f flake.lock.before
      - name: Validate flake
        if: steps.check-updates.outputs.changes_detected == 'true'
        id: validate
        run: |
          # Light validation: ensure flake metadata and Darwin configs evaluate.
          # NixOS configs need --impure for facter.json, and full nix flake check
          # is too strict here (pure mode, evaluates VM tests, etc.).
          # The real CI (pr-validation.yml) does thorough per-config validation.
          FAILED=false

          if ! nix flake metadata --json > /dev/null 2>&1; then
            echo "::error::Flake metadata evaluation failed"
            FAILED=true
          fi

          # Check Darwin configs evaluate (pure-safe, no facter.json)
          DARWIN_CONFIGS=$(nix eval .#darwinConfigurations \
            --apply 'x: builtins.attrNames x' --json 2>/dev/null || echo '[]')
          for config in $(echo "$DARWIN_CONFIGS" | jq -r '.[]'); do
            if ! nix eval ".#darwinConfigurations.${config}.system" \
                --apply 'x: true' 2>/dev/null; then
              echo "::error::Darwin config '$config' failed to evaluate"
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Flake validation failed — PR will not be created"
          else
            echo "status=passed" >> "$GITHUB_OUTPUT"
          fi
      - name: Create PR with auto-merge
        if: >
          ${{
            steps.check-updates.outputs.changes_detected == 'true' &&
            steps.validate.outputs.status == 'passed'
          }}
        id: create-pr
        run: |
          branch_name="weekly-release-$(date +%Y-%m-%d)"
          git push origin --delete "$branch_name" 2>/dev/null || true
          git checkout -b "$branch_name"
          git push origin "$branch_name"

          gh label create "flake-update" \
            --description "Weekly flake dependency updates" \
            --color "0e8a16" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh label create "weekly-release" \
            --description "Weekly release cycle" \
            --color "6f42c1" \
            --repo ${{ github.repository }} 2>/dev/null || true

          pr_url=$(gh pr create \
            --title "Weekly Release - $(date +%Y-%m-%d)" \
            --body "$(cat <<'BODY'
          ## Weekly Release

          **Inputs updated**: ${{ steps.check-updates.outputs.changed_inputs }}

          This PR updates flake.lock with the latest dependency versions.
          It will auto-merge once CI passes. After merge, the release
          workflow will automatically build the ISO and create a release.

          ---
          Created automatically by the weekly release workflow.
          BODY
          )" \
            --label "flake-update" \
            --label "weekly-release" \
            --repo ${{ github.repository }})

          pr_number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\).*/\1/')
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

          # Enable auto-merge (squash) — merges automatically when CI passes
          gh pr merge "$pr_number" --auto --squash \
            --repo ${{ github.repository }}
          echo "Auto-merge enabled for PR #$pr_number"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Summary
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: flake-update
    if: always()
    steps:
      - name: Report results
        run: |
          echo "## Weekly Flake Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          FLAKE="${{ needs.flake-update.result }}"

          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Flake Update | $FLAKE |" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "${{ needs.flake-update.outputs.pr-url }}" ]; then
            PR_URL="${{ needs.flake-update.outputs.pr-url }}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "PR created: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
            echo "Auto-merge enabled. Release will trigger on merge." \
              >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.flake-update.outputs.changes-detected }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Validation failed** — PR was not created." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No flake input changes detected." >> "$GITHUB_STEP_SUMMARY"
          fi
