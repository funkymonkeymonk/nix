---
name: Main Branch Build
# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-darwin:
    name: Build Darwin Configurations
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build Darwin configurations (push to Cachix)
        run: |
          echo "Building Darwin configurations and pushing to Cachix..."
          echo "Building wweaver configuration..."
          nix build .#darwinConfigurations.wweaver.system --no-link
          echo "wweaver build complete"
          echo "Building MegamanX configuration..."
          nix build .#darwinConfigurations.MegamanX.system --no-link
          echo "MegamanX build complete"
          echo "All Darwin configurations built and pushed to Cachix"
  build-linux:
    name: Build Linux Configurations
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: funkymonkeymonk
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Build Linux configurations (push to Cachix)
        run: |
          echo "Building NixOS configurations and pushing to Cachix..."
          echo "Building zero configuration..."
          nix build .#nixosConfigurations.zero.config.system.build.toplevel --no-link
          echo "zero build complete"
          echo ""
          echo "Building Cattle configurations..."
          echo "Building type-desktop configuration..."
          nix build .#nixosConfigurations.type-desktop.config.system.build.toplevel --no-link
          echo "type-desktop build complete"
          echo "Building type-server configuration..."
          nix build .#nixosConfigurations.type-server.config.system.build.toplevel --no-link
          echo "type-server build complete"
          echo "All NixOS configurations built and pushed to Cachix"
